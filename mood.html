<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile</title>
    <link rel="stylesheet" href="./style.css">
</head>
<header>
    <h1>Mood Tracker</h1>
</header>
<body>
    <form action="">
        <!-- Mood input -->
        <label for="mood">How are you feeling today?</label>
        <input type="text" id="mood" name="mood">
        <!-- Duration input -->
        <label for="how long">How long have you been feeling this way?</label>
        <input type="text" id="how long" name="how long">
        <button type="submit">Submit</button>
    </form>
    <div>
        <h2>Notepad</h2>
        <textarea name="notepad" id="notepad"></textarea>
    </div>
    <h2>Advice</h2>
    <p>Remember, it's okay to have bad days. Take care of yourself and reach out to friends or family if you need support.</p>
    
</body>
</html>
